<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Página Principal</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        
        
        <div th:fragment="cardFerramenta(f)" class="card">
            <div class="card-body">
                <h5 th:text="${f.nome}">Nome</h5>
                <div class="progress">
                    <div class="progress-bar"
                         th:style="width: ' + ${f.percentualDesgaste} + '%' "
                         th:classappend="$f{percentualDesgaste > 80} ? 'bg-danger' :
                         (${f.percentualDesgaste > 50} ? 'bg-warning' : bg-sucess')">
                        
                    </div>
                </div>
            </div>
        </div>
    
    </body>
</html>
